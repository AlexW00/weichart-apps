<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Weichart — Apps for Humans</title>
		<meta name="description" content="Apps for Humans — thoughtfully crafted iOS apps by Weichart." />
		<meta name="theme-color" content="#FEFEF4" />

		<!-- Favicons -->
		<link rel="icon" href="/favicon.ico" sizes="48x48" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- Open Graph -->
		<meta property="og:title" content="Weichart — Apps for Humans" />
		<meta property="og:description" content="Thoughtfully crafted iOS apps by Weichart." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://apps.weichart.de" />
	</head>
	<body>
		<div id="scene">
			<!-- Sky gradient (animated via JS) -->
			<div id="sky-gradient"></div>

			<!-- Cloud marquee -->
			<div id="clouds">
				<div class="cloud-strip">
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
					<img src="/cloud-colored.png" alt="" class="cloud" />
				</div>
			</div>

			<!-- Title -->
			<div id="title">
				<h1>Weichart</h1>
				<p class="subtitle">Apps for <span id="typing-word">Humans</span><span id="cursor">|</span></p>
			</div>

			<!-- Screenshot lanes (vertical barrel scroll, fade in on app hover) -->
			<div id="screenshot-bg">
				<div class="screenshot-group" data-app="0">
					<div class="ss-lane ss-lane--left">
						<div class="ss-lane__strip">
							<img class="ss" src="/screenshots/zettel/1.png" alt="" />
							<img class="ss" src="/screenshots/zettel/2.png" alt="" />
							<img class="ss" src="/screenshots/zettel/3.png" alt="" />
							<img class="ss" src="/screenshots/zettel/1.png" alt="" />
							<img class="ss" src="/screenshots/zettel/2.png" alt="" />
							<img class="ss" src="/screenshots/zettel/3.png" alt="" />
						</div>
					</div>
					<div class="ss-lane ss-lane--right">
						<div class="ss-lane__strip ss-lane__strip--reverse">
							<img class="ss" src="/screenshots/zettel/4.png" alt="" />
							<img class="ss" src="/screenshots/zettel/1.png" alt="" />
							<img class="ss" src="/screenshots/zettel/2.png" alt="" />
							<img class="ss" src="/screenshots/zettel/4.png" alt="" />
							<img class="ss" src="/screenshots/zettel/1.png" alt="" />
							<img class="ss" src="/screenshots/zettel/2.png" alt="" />
						</div>
					</div>
				</div>

				<div class="screenshot-group" data-app="1">
					<div class="ss-lane ss-lane--left">
						<div class="ss-lane__strip">
							<img class="ss" src="/screenshots/zeitgeist/1.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/2.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/3.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/1.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/2.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/3.png" alt="" />
						</div>
					</div>
					<div class="ss-lane ss-lane--right">
						<div class="ss-lane__strip ss-lane__strip--reverse">
							<img class="ss" src="/screenshots/zeitgeist/4.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/1.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/2.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/4.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/1.png" alt="" />
							<img class="ss" src="/screenshots/zeitgeist/2.png" alt="" />
						</div>
					</div>
				</div>

				<div class="screenshot-group" data-app="2">
					<div class="ss-lane ss-lane--left">
						<div class="ss-lane__strip">
							<img class="ss" src="/screenshots/hibi/1.png" alt="" />
							<img class="ss" src="/screenshots/hibi/2.png" alt="" />
							<img class="ss" src="/screenshots/hibi/3.png" alt="" />
							<img class="ss" src="/screenshots/hibi/1.png" alt="" />
							<img class="ss" src="/screenshots/hibi/2.png" alt="" />
							<img class="ss" src="/screenshots/hibi/3.png" alt="" />
						</div>
					</div>
					<div class="ss-lane ss-lane--right">
						<div class="ss-lane__strip ss-lane__strip--reverse">
							<img class="ss" src="/screenshots/hibi/4.png" alt="" />
							<img class="ss" src="/screenshots/hibi/1.png" alt="" />
							<img class="ss" src="/screenshots/hibi/2.png" alt="" />
							<img class="ss" src="/screenshots/hibi/4.png" alt="" />
							<img class="ss" src="/screenshots/hibi/1.png" alt="" />
							<img class="ss" src="/screenshots/hibi/2.png" alt="" />
						</div>
					</div>
				</div>
			</div>

			<!-- Tree with apps -->
			<div id="tree-container">
				<img id="tree" src="/tree-colored.png" alt="A tree made of code" />

				<!-- App icons (triangle: apex, left base, right base) -->
				<div
					class="app-icon"
					data-index="0"
					data-name="Zettel"
					data-subtitle="Minimalist Quick Notes"
					tabindex="0"
				>
					<img src="/zettel-icon.png" alt="Zettel" />
					<div class="app-tooltip" role="tooltip">
						<span class="app-tooltip__name">Zettel</span>
						<span class="app-tooltip__subtitle">Minimalist Quick Notes</span>
					</div>
				</div>
				<div
					class="app-icon"
					data-index="1"
					data-name="Zeitgeist"
					data-subtitle="Your Time, Organized"
					tabindex="0"
				>
					<img src="/zeitgeist-icon.png" alt="Zeitgeist" />
					<div class="app-tooltip" role="tooltip">
						<span class="app-tooltip__name">Zeitgeist</span>
						<span class="app-tooltip__subtitle">Your Time, Organized</span>
					</div>
				</div>
				<div class="app-icon" data-index="2" data-name="Hibi" data-subtitle="Paper-like Calendar" tabindex="0">
					<img src="/hibi-icon.png" alt="Hibi" />
					<div class="app-tooltip" role="tooltip">
						<span class="app-tooltip__name">Hibi</span>
						<span class="app-tooltip__subtitle">Paper-like Calendar</span>
					</div>
				</div>
			</div>
		</div>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
